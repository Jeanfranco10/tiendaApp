<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Sistema de Gestión</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/crud.css">
  <style>
    .page-header-info h1 i { color: #00685f; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="page-header">
    <div class="page-header-left">
      <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="page-header-info">
        <h1><i class="fas fa-box"></i> Gestión de Productos</h1>
        <p>Administra el inventario de productos.</p>
      </div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <i class="fas fa-plus"></i> Nuevo Producto
    </button>
  </header>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- FILTROS -->
    <section class="filters-section">
      <div class="filters-row">
        <div class="filter-group">
          <label for="searchInput">Buscar</label>
          <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Nombre o descripción...">
          </div>
        </div>
        <div class="filter-group">
          <label for="categoryFilter">Categoría</label>
          <select id="categoryFilter">
            <option value="">Todas las categorías</option>
          </select>
        </div>
        <div class="filter-group" style="max-width:160px;">
          <label for="statusFilter">Estado</label>
          <select id="statusFilter">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="filter-btn primary" onclick="applyFilters()">
            <i class="fas fa-search"></i> Filtrar
          </button>
          <button class="filter-btn secondary" onclick="clearFilters()">
            <i class="fas fa-times"></i> Limpiar
          </button>
        </div>
      </div>
    </section>

    <!-- TABLA -->
    <section class="table-section">
      <div class="table-header">
        <span class="table-title">Lista de Productos</span>
        <span class="table-info" id="tableInfo">Cargando...</span>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">ID</th>
              <th>Producto</th>
              <th>Categoría</th>
              <th style="width:100px;" class="num-col">Precio</th>
              <th style="width:80px;" class="num-col">Stock</th>
              <th>Proveedor</th>
              <th style="width:100px;">Estado</th>
              <th style="width:80px;">Imagen</th>
              <th style="width:120px;" class="actions-col">Acciones</th>
            </tr>
          </thead>
          <tbody id="productosTableBody">
            <tr>
              <td colspan="9">
                <div class="loading">
                  <div class="spinner"></div>
                  <p>Cargando productos...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- MODAL -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Nuevo Producto</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre del Producto *</label>
              <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
              <label for="precio">Precio *</label>
              <input type="number" id="precio" name="precio" step="0.01" min="0" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="categoria_id">Categoría</label>
              <select id="categoria_id" name="categoria_id">
                <option value="">Seleccionar categoría</option>
              </select>
            </div>
            <div class="form-group">
              <label for="proveedor_id">Proveedor</label>
              <select id="proveedor_id" name="proveedor_id">
                <option value="">Seleccionar proveedor</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="stock">Stock</label>
              <input type="number" id="stock" name="stock" min="0" value="0">
            </div>
            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" name="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="imagen">URL de Imagen</label>
            <input type="url" id="imagen" name="imagen" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="modal-btn btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/productos.js"></script>
</body>
</html>
