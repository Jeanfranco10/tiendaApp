<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Sistema de Gestión</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/productos.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="page-title">
        <button class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
          <span>Volver</span>
        </button>
        <h1>
          <i class="fas fa-box"></i>
          Gestión de Productos
        </h1>
      </div>
      <div class="header-actions">
        <button class="add-btn" onclick="openModal()">
          <i class="fas fa-plus"></i>
          <span>Nuevo Producto</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Filters -->
    <div class="filters-section">
      <div class="filters-row">
        <div class="filter-group">
          <label for="searchInput">Buscar producto</label>
          <input type="text" id="searchInput" placeholder="Nombre o descripción...">
        </div>
        <div class="filter-group">
          <label for="categoryFilter">Categoría</label>
          <select id="categoryFilter">
            <option value="">Todas las categorías</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="statusFilter">Estado</label>
          <select id="statusFilter">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="filter-btn primary" onclick="applyFilters()">
            <i class="fas fa-search"></i>
            Filtrar
          </button>
          <button class="filter-btn secondary" onclick="clearFilters()">
            <i class="fas fa-times"></i>
            Limpiar
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">Lista de Productos</div>
        <div class="table-info" id="tableInfo">Cargando...</div>
      </div>
      <div class="table-container">
        <table id="productosTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Proveedor</th>
              <th>Estado</th>
              <th>Imagen</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productosTableBody">
            <tr>
              <td colspan="9">
                <div class="loading">
                  <div class="spinner"></div>
                  <p>Cargando productos...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nuevo Producto</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <input type="hidden" id="productId">
          
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre del Producto *</label>
              <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
              <label for="precio">Precio *</label>
              <input type="number" id="precio" name="precio" step="0.01" min="0" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="categoria_id">Categoría</label>
              <select id="categoria_id" name="categoria_id">
                <option value="">Seleccionar categoría</option>
              </select>
            </div>
            <div class="form-group">
              <label for="proveedor_id">Proveedor</label>
              <select id="proveedor_id" name="proveedor_id">
                <option value="">Seleccionar proveedor</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="stock">Stock</label>
              <input type="number" id="stock" name="stock" min="0" value="0">
            </div>
            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" name="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="imagen">URL de Imagen</label>
              <input type="url" id="imagen" name="imagen" placeholder="https://...">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="descripcion">Descripción</label>
              <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto..."></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="modal-btn btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/productos.js"></script>
</body>
</html>
