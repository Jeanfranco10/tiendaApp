<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas - Sistema de Gestión</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/crud.css">
  <style>
    .page-header-info h1 i { color: #ef4444; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="page-header">
    <div class="page-header-left">
      <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="page-header-info">
        <h1><i class="fas fa-chart-line"></i> Gestión de Ventas</h1>
        <p>Registra y consulta las ventas realizadas.</p>
      </div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <i class="fas fa-plus"></i> Nueva Venta
    </button>
  </header>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- FILTROS -->
    <section class="filters-section">
      <div class="filters-row">
        <div class="filter-group">
          <label for="searchInput">Buscar</label>
          <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cliente o email...">
          </div>
        </div>
        <div class="filter-group" style="max-width:200px;">
          <label for="statusFilter">Estado</label>
          <select id="statusFilter">
            <option value="">Todos</option>
            <option value="completada">Completada</option>
            <option value="pendiente">Pendiente</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="filter-btn primary" onclick="applyFilters()">
            <i class="fas fa-search"></i> Filtrar
          </button>
          <button class="filter-btn secondary" onclick="clearFilters()">
            <i class="fas fa-times"></i> Limpiar
          </button>
        </div>
      </div>
    </section>

    <!-- TABLA -->
    <section class="table-section">
      <div class="table-header">
        <span class="table-title">Listado de Ventas</span>
        <span class="table-info" id="tableInfo"></span>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">ID</th>
              <th>Cliente</th>
              <th>Email</th>
              <th>Fecha</th>
              <th style="width:100px;" class="num-col">Total</th>
              <th style="width:120px;">Estado</th>
              <th style="width:100px;" class="actions-col">Acciones</th>
            </tr>
          </thead>
          <tbody id="ventasTableBody">
            <tr>
              <td colspan="7">
                <div class="empty-state">
                  <i class="fas fa-cash-register"></i>
                  <h3>No hay ventas</h3>
                  <p>Comienza registrando tu primera venta</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- MODAL NUEVA VENTA -->
  <div class="modal" id="saleModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Nueva Venta</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="saleForm">
          <div class="form-row">
            <div class="form-group">
              <label for="cliente_id">Cliente ID</label>
              <input type="number" id="cliente_id" name="cliente_id" required>
            </div>
            <div class="form-group">
              <label for="estadoVenta">Estado</label>
              <select id="estadoVenta" name="estado" required>
                <option value="pendiente">Pendiente</option>
                <option value="completada">Completada</option>
                <option value="cancelada">Cancelada</option>
              </select>
            </div>
          </div>

          <!-- DETALLES DE PRODUCTOS -->
          <div style="margin-top:16px; border-top:1px solid rgba(188,201,198,0.3); padding-top:16px;">
            <h3 style="font-size:16px; font-weight:600; margin-bottom:12px; color:#0b1c30;">
              <i class="fas fa-box"></i> Detalles de la Venta
            </h3>
            <div id="detallesContainer">
              <div class="detalle-row" style="display:flex; gap:8px; margin-bottom:8px; align-items:center;">
                <input type="number" name="producto_id" placeholder="Producto ID" required
                  style="flex:1; padding:10px 12px; border:1px solid #bcc9c6; border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none;">
                <input type="number" name="cantidad" placeholder="Cantidad" required
                  style="width:100px; padding:10px 12px; border:1px solid #bcc9c6; border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none;">
                <input type="number" step="0.01" name="precio_unitario" placeholder="Precio" required
                  style="width:120px; padding:10px 12px; border:1px solid #bcc9c6; border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none;">
                <button type="button" onclick="removeDetalle(this)"
                  style="width:36px; height:36px; border:none; background:transparent; color:#ba1a1a; border-radius:8px; cursor:pointer; font-size:18px;">❌</button>
              </div>
            </div>
            <button type="button" onclick="addDetalle()"
              style="margin-top:8px; padding:10px 16px; border:1px dashed #bcc9c6; border-radius:8px; background:transparent; color:#00685f; font-size:14px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; width:100%;">
              <i class="fas fa-plus"></i> Agregar Producto
            </button>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="modal-btn btn-save" type="button" onclick="submitVenta()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../js/ventas.js"></script>
</body>
</html>
