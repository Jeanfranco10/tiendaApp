<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Ventas</title>
    <link rel="stylesheet" href="../css/ventas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="page-title">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <h1>Ventas</h1>
            </div>
            <div class="header-actions">
                <button class="add-btn" onclick="openModal()">
                    <i class="fas fa-plus"></i> Nueva Venta
                </button>
            </div>
        </div>
    </header>

    <!-- Contenedor -->
    <main class="container">
        <!-- Filtros -->
        <section class="filters-section">
            <div class="filters-row">
                <div class="filter-group">
                    <label for="searchInput">Buscar</label>
                    <input type="text" id="searchInput" placeholder="Cliente o email...">
                </div>
                <div class="filter-group">
                    <label for="statusFilter">Estado</label>
                    <select id="statusFilter">
                        <option value="">Todos</option>
                        <option value="completada">Completada</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="cancelada">Cancelada</option>
                    </select>
                </div>
                 <!-- Botón limpiar -->
        <div class="filter-group">
        
            <button type="button" class="clear-btn" onclick="clearFilters()">
                <i class="fas fa-times"></i>Limpiar</button>
        </div>
            </div>
        </section>

        <!-- Tabla -->
       <section class="table-section">
    <div class="table-header">
        <span class="table-title">Listado de Ventas</span>
        <span id="tableInfo" class="table-info"></span>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Email</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="ventasTableBody">
                <!-- Estado vacío por defecto -->
                <tr>
                    <td colspan="7">
                        <div class="empty-state">
                            <i class="fas fa-cash-register"></i>
                            <h3>No hay ventas</h3>
                            <p>Comienza registrando tu primera venta</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
    </main>

    <!-- Modal Nueva Venta -->
    <div id="saleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nueva Venta</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="saleForm">
                    <!-- Cliente -->
                    <div class="form-group">
                        <label for="cliente_id">Cliente ID</label>
                        <input type="number" id="cliente_id" name="cliente_id" required>
                    </div>

                    <!-- Estado de la venta -->
                <div class="form-group">
                    <label for="estadoVenta">Estado</label>
                    <select id="estadoVenta" name="estado" required>
                        <option value="pendiente">Pendiente</option>
                        <option value="completada">Completada</option>
                        <option value="cancelada">Cancelada</option>
                    </select>
                </div>

                    <!-- Detalles de productos -->
                    <div id="detallesContainer">
                        <h3>Detalles de la Venta</h3>
                        <div class="detalle-row">
                            <input type="number" name="producto_id" placeholder="Producto ID" required>
                            <input type="number" name="cantidad" placeholder="Cantidad" required>
                            <input type="number" step="0.01" name="precio_unitario" placeholder="Precio Unitario" required>
                            <button type="button" onclick="removeDetalle(this)">❌</button>
                        </div>
                    </div>
                    <button type="button" onclick="addDetalle()">➕ Agregar Producto</button>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="modal-btn btn-save" type="button" onclick="submitVenta()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="../js/ventas.js"></script>
</body>
</html>
